version: 2

project_name: checksy

before:
  hooks:
    - go mod tidy

builds:
  - id: checksy
    main: ./cmd/checksy
    binary: checksy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/flexdinesh/checksy/internal/version.Version={{.Version}} -X github.com/flexdinesh/checksy/internal/version.Commit={{.Commit}} -X github.com/flexdinesh/checksy/internal/version.Date={{.CommitDate}}

archives:
  - id: tarballs
    ids:
      - checksy
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

release:
  replace_existing_artifacts: true

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: Maintenance
      regexp: '^.*?(chore|refactor|test|ci)(\(.+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - '^Merge pull request'
      - '^Merge branch'

homebrew_casks:
  - name: checksy
    repository:
      owner: flexdinesh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: "checksy-{{ .Tag }}"
      pull_request:
        enabled: true
        base:
          owner: flexdinesh
          name: homebrew-tap
          branch: main
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "Update checksy to {{ .Tag }}"
    directory: Casks
    homepage: https://github.com/flexdinesh/checksy
    description: Internet connectivity checker with HTTP, ping, DNS, and IP diagnostics
    binaries:
      - checksy
    caveats: |
      Run `checksy --help` to view available command-line options.
